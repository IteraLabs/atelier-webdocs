# ─────────────────────────────────────────────────────────────────────
#  atelier-webdocs nginx config — standalone docs container.
#
#  Designed for atelier-infra to point Cloudflare Tunnel
#  (www.iteralabs.xyz/atelier/docs/* → this container:80) at a single
#  drop-in container. Path layout matches what the webapp's nginx used
#  to expose, so the public URL (/atelier/docs/) is unchanged at
#  cutover.
#
#  This container ONLY serves docs. The SPA at /atelier/, the REST API
#  at /api/, and the WebSocket at /ws/ are still served by the
#  atelier-webapp container — Cloudflare Tunnel routes those paths to
#  it, and the /atelier/docs/ path here.
# ─────────────────────────────────────────────────────────────────────

server {
    listen 80 default_server;
    server_name www.iteralabs.xyz iteralabs.xyz _;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Docs (MkDocs build output) ──────────────────────────────
    # `^~` anchors this prefix above any regex location below.
    # `alias` strips the /atelier/docs/ prefix from the URI before
    # mapping to /usr/share/nginx/docs/.
    location ^~ /atelier/docs/ {
        alias /usr/share/nginx/docs/;
        index index.html;
        try_files $uri $uri/ $uri.html =404;
    }

    # Bare /atelier/docs (no trailing slash) → /atelier/docs/.
    location = /atelier/docs {
        return 301 /atelier/docs/;
    }

    # Catch-all redirect to docs root. If something is misrouted to
    # this container (it shouldn't be — Cloudflare only forwards the
    # docs path), send the visitor somewhere useful instead of 404.
    location / {
        return 302 /atelier/docs/;
    }

    # ── Static asset caching ─────────────────────────────────────
    # mkdocs-material's bundled JS/CSS/fonts have content-hashed
    # filenames, so they can be cached aggressively.
    location ~* ^/atelier/docs/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        alias /usr/share/nginx/docs/;
        rewrite ^/atelier/docs/(.*)$ /$1 break;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health endpoint for atelier-infra liveness probes.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
