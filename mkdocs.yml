# ─────────────────────────────────────────────────────────────────────
#  mkdocs.yml — atelier-webdocs
#
#  Builds the Atelier SDK documentation site, served at
#  https://www.iteralabs.xyz/atelier/docs/  (subpath deploy via the
#  Cloudflare Tunnel that fronts iteralabs.xyz).
#
#  Versioning is handled by `mike`: each tagged release publishes its
#  own subdirectory (e.g. /atelier/docs/0.1.0-beta/) and the `latest`
#  alias points at the most recent stable docs version. Doc-version
#  is decoupled from SDK-version (the SDK version this site documents
#  is read from the `SDK_VERSION` file at the repo root and surfaced
#  in the page footer via overrides/partials/copyright.html).
# ─────────────────────────────────────────────────────────────────────

site_name: Atelier SDK
site_description: Documentation for the Atelier SDK — quantitative & ML research simulator
# Trailing slash matters: MkDocs uses this as the base for the canonical
# <link> tag and the sitemap.
site_url: https://www.iteralabs.xyz/atelier/docs/
site_author: IteraLabs

# "Edit on GitHub" pencil points at the SDK repo for SDK pages and is
# overridden per-page where appropriate via `edit_uri`.
repo_name: IteraLabs/atelier-sdk
repo_url: https://github.com/IteraLabs/atelier-sdk
edit_uri: ""

# Strict mode promotes warnings (broken links, orphan pages, missing
# nav entries) to build errors. Together with the `validation` block
# below, this is what keeps the docs honest in CI.
strict: true

# Every page becomes /<page>/index.html — required for the nginx
# try_files chain to resolve nested pages cleanly under /atelier/docs/.
use_directory_urls: true

# ─────────────────────────────────────────────────────────────────────
#  Validation
#  ──────────
#  Promotes "quiet" warnings to errors so strict mode catches them.
#  The exclude_docs entries keep _readme-drafts/ and other internal
#  staging out of the build without tripping omitted_files.
# ─────────────────────────────────────────────────────────────────────
validation:
  # The auto-generated API skeleton (docs/sdk/api/<crate>/<module>/index.md)
  # produces ~100 pages outside the curated `nav`. They're reachable via
  # the per-crate index tables and via search, but treating them as nav
  # orphans would force ~100 hand-maintained nav entries that change on
  # every `make sdk-api` regen. `info` keeps mkdocs informative without
  # tripping strict mode on this expected pattern.
  omitted_files: info
  absolute_links: warn
  unrecognized_links: warn

# Files that exist under docs/ but are intentionally not part of the
# rendered site (drafts, internal staging, archives).
exclude_docs: |
  _readme-drafts/

# ─────────────────────────────────────────────────────────────────────
#  Theme — Material, dark/light, custom partials in overrides/.
# ─────────────────────────────────────────────────────────────────────
theme:
  name: material
  language: en
  custom_dir: overrides
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.tabs          # top-level groups become horizontal tabs (Lab vs Build)
    - navigation.sections      # second-level groups render as sidebar sections
    - navigation.indexes       # a section's landing page is its own index
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  # Dark-first: slate is the hard default (no `media`, so it does not
  # defer to the OS preference); the toggle switches to light and persists
  # the choice. Brand colours are driven entirely from CSS custom
  # properties (docs/stylesheets/tokens.css + theme.css), so no named
  # `primary`/`accent` here — that keeps Material's preset palette CSS from
  # fighting the --md-* overrides.
  palette:
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: DM Sans
    code: JetBrains Mono
  # Header mark = IteraLabs (the lab is the identity); the site title
  # "Atelier SDK" names the documented product alongside it.
  logo: assets/iteralabs-mark.png
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github

extra_css:
  # Order matters: tokens define the brand --c-* vars, theme maps them onto
  # Material's --md-* vars and styles code/admonitions, extra is misc tweaks.
  - stylesheets/tokens.css
  - stylesheets/theme.css
  - stylesheets/extra.css

# ─────────────────────────────────────────────────────────────────────
#  Versioning (mike) — the version selector dropdown lives here.
#  `extra.version.provider: mike` tells the Material theme to read the
#  versions.json that mike publishes to the gh-pages branch.
#
#  `extra.atelier_sdk_version` is read by overrides/partials/copyright.html
#  and rendered in the page footer. The build wrapper (scripts/build.sh,
#  Dockerfile) injects it from the SDK_VERSION file at build time so
#  this stays a single source of truth.
# ─────────────────────────────────────────────────────────────────────
extra:
  version:
    provider: mike
    default: latest
  atelier_sdk_version: !ENV [ATELIER_SDK_VERSION, "0.0.10"]
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/IteraLabs
  generator: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  # Research surface (Pillar 1). Material's built-in blog plugin gives
  # authored, dated, read-time-stamped, categorized posts plus an archive
  # and topic index — the "scholarly furniture" a research lab needs — with
  # no extra pip dependencies. Posts live in docs/research/posts/, authors
  # in docs/research/.authors.yml.
  - blog:
      blog_dir: research
      blog_toc: true
      post_url_format: "{slug}"
      post_readtime: true
      post_date_format: long
      archive: true
      archive_name: Archive
      categories: true
      categories_name: Topics
      authors: true
      pagination_per_page: 10
  - git-revision-date-localized:
      enabled: !ENV [GIT_REVISION_DATE_ENABLED, true]
      type: date
      fallback_to_build_date: true
      enable_creation_date: false

# ─────────────────────────────────────────────────────────────────────
#  Navigation
#  ──────────
#  Curated explicit nav. New markdown files must be added here or
#  validation.omitted_files will fail strict mode.
# ─────────────────────────────────────────────────────────────────────
#  Top-level entries render as horizontal TABS (navigation.tabs), grouped
#  "Lab vs Build": Overview / Research are the lab front door; SDK / Platform
#  are the build surface; About closes. Each tab's first child is its index
#  page (navigation.indexes), so clicking a tab lands somewhere sensible.
#
#  Demoted from public nav (file kept, reachable by URL/search):
#    - operations/cutover-runbook.md — internal docs-site publish runbook.
nav:
  - Overview:
      - index.md
      - Getting started: sdk/getting-started.md
      - Architecture: sdk/architecture.md

  # Research surface — the blog plugin nests posts / archive / topics here.
  - Research:
      - research/index.md

  - SDK:
      - sdk/index.md
      - atelier-types: sdk/types/index.md
      - atelier-connect: sdk/connect/index.md
      - atelier-io: sdk/io/index.md
      - atelier-data: sdk/data/index.md
      - atelier-quant: sdk/quant/index.md
      - atelier-telemetry: sdk/telemetry/index.md
      - Tutorials:
          - Overview: guides/index.md
          - Bybit → Parquet: guides/01-bybit-to-parquet.md
          - Multi-exchange sync: guides/02-multi-exchange-sync.md
          - Hawkes on arrivals: guides/03-hawkes-on-arrivals.md
      - API reference:
          - Overview: sdk/api/index.md
          - atelier-types: sdk/api/atelier-types/index.md
          - atelier-connect: sdk/api/atelier-connect/index.md
          - atelier-io: sdk/api/atelier-io/index.md
          - atelier-data: sdk/api/atelier-data/index.md
          - atelier-quant: sdk/api/atelier-quant/index.md
          - atelier-telemetry: sdk/api/atelier-telemetry/index.md

  - Platform:
      - Platform API: backend/index.md
      - Wire protocol: proto/proto.md
      - Dataset catalog: datasets/index.md
      - Operations:
          - Overview: operations/index.md
          - atelier-agent: operations/agent.md

  - About:
      - about.md
      - Brand & identity: about/brand.md
