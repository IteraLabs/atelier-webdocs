# .github/workflows/ci.yml
#
# Runs on every PR and on every push to main. The single contract:
# `mkdocs build --strict` must succeed, and the resulting HTML must
# pass the link checker. Anything that breaks either is a CI failure.
#
# What we deliberately do NOT do here:
#   * Build the Docker image (deploy.yml does that on main / tags).
#   * Regenerate docs/sdk/api/ from atelier-sdk — that's a manual step
#     against a checked-in snapshot, run during release prep.

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # git-revision-date-localized needs the full history to read
          # the last-modified timestamp of each markdown file.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements-dev.txt

      - name: Build (strict)
        run: mkdocs build --strict --site-dir site

      - name: Link check (internal only)
        # --no-warnings keeps the log focused on actual broken links.
        # External links are checked in a separate, non-blocking job
        # so flaky third-party servers don't fail the PR.
        run: |
          linkchecker \
            --no-warnings \
            --check-extern=0 \
            site/index.html

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site/
          retention-days: 7

  external-linkcheck:
    name: External link check (non-blocking)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site
          path: site/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install linkchecker==10.5.0
      - run: linkchecker --check-extern site/index.html
