# .github/workflows/deploy.yml
#
# Two deploy paths:
#   * push to main         → build & push the `dev` Docker image tag.
#                            atelier-infra picks this up for the
#                            staging /atelier/docs/ deployment.
#   * push of a v* tag     → build & push a versioned image AND publish
#                            a new mike version to the gh-pages branch.
#                            atelier-infra rolls the production image
#                            from this tag.
#
# The container image is the canonical deploy artifact (see Dockerfile).
# The gh-pages publish is a fallback / mirror — useful for offline
# preview and as a safety net if the container registry is unreachable.

name: deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: write     # mike pushes to gh-pages
  packages: write     # GHCR push

jobs:
  docker:
    name: Build & push container image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # for git-revision-date-localized

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          REPO_LOWER="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${REPO_LOWER}"
          TAGS="${IMAGE}:dev"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="${IMAGE}:${VERSION},${IMAGE}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Layer caching across runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  mike:
    # Versioned mike publish only on tag push. Main pushes don't bump
    # versions; the `dev` Docker image tag covers the staging case.
    name: Publish mike version
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git for mike
        run: |
          git config user.name  "atelier-docs-bot"
          git config user.email "docs-bot@iteralabs.xyz"

      - name: Publish version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ./scripts/deploy-version.sh "${VERSION}"
